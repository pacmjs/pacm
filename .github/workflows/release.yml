name: Release

on:
    release:
        types: [created]

jobs:
    build-windows:
        runs-on: windows-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v2

        - name: Set up Deno
          uses: denoland/setup-deno@v1
          with:
            deno-version: v2.x

        - name: Install Deno dependencies
          run: deno install

        - name: Run compile
          run: deno run compile

        - name: Upload compiled files
          uses: actions/upload-artifact@v3
          with:
            name: dist-windows
            path: dist/

    build-linux:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v2

        - name: Set up Deno
          uses: denoland/setup-deno@v1
          with:
            deno-version: v2.x

        - name: Install Deno dependencies
          run: deno install

        - name: Run compile
          run: deno run compile

        - name: Upload compiled files
          uses: actions/upload-artifact@v3
          with:
            name: dist-linux
            path: dist/

    build-macos:
        runs-on: macos-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v2

        - name: Set up Deno
          uses: denoland/setup-deno@v1
          with:
            deno-version: v2.x

        - name: Install Deno dependencies
          run: deno install

        - name: Run compile
          run: deno run compile

        - name: Upload compiled files
          uses: actions/upload-artifact@v3
          with:
            name: dist-macos
            path: dist/

    upload-release-assets:
        runs-on: ubuntu-latest
        needs: [build-windows, build-linux, build-macos]
        steps:
        - name: Download Windows artifact
          uses: actions/download-artifact@v3
          with:
            name: dist-windows
            path: ./dist-windows

        - name: Download Linux artifact
          uses: actions/download-artifact@v3
          with:
            name: dist-linux
            path: ./dist-linux

        - name: Download macOS artifact
          uses: actions/download-artifact@v3
          with:
            name: dist-macos
            path: ./dist-macos

        - name: Compress Windows artifact
          run: zip -r dist-windows.zip ./dist-windows

        - name: Compress Linux artifact
          run: zip -r dist-linux.zip ./dist-linux

        - name: Compress macOS artifact
          run: zip -r dist-macos.zip ./dist-macos

        - name: Upload Windows release asset
          uses: actions/upload-release-asset@v1
          with:
            upload_url: ${{ github.event.release.upload_url }}
            asset_path: ./dist-windows.zip
            asset_name: dist-windows.zip
            asset_content_type: application/zip

        - name: Upload Linux release asset
          uses: actions/upload-release-asset@v1
          with:
            upload_url: ${{ github.event.release.upload_url }}
            asset_path: ./dist-linux.zip
            asset_name: dist-linux.zip
            asset_content_type: application/zip

        - name: Upload macOS release asset
          uses: actions/upload-release-asset@v1
          with:
            upload_url: ${{ github.event.release.upload_url }}
            asset_path: ./dist-macos.zip
            asset_name: dist-macos.zip
            asset_content_type: application/zip