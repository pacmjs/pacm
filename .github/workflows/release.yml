name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v2.x

    - name: Install dependencies
      run: deno install

    - name: Run package
      run: deno run package-windows

    - name: Rename output file
      run: mv release/pacm.exe release/pacm-windows.exe

    - name: Upload compiled files
      uses: actions/upload-artifact@v3
      with:
        name: dist-windows
        path: release/pacm-windows.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v2.x

    - name: Install dependencies
      run: deno install

    - name: Run package
      run: deno run package

    - name: Rename output file
      run: mv release/pacm release/pacm-linux

    - name: Upload compiled files
      uses: actions/upload-artifact@v3
      with:
        name: dist-linux
        path: release/pacm-linux

  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Deno
      uses: denoland/setup-deno@v1
      with:
        deno-version: v2.x

    - name: Install dependencies
      run: deno install

    - name: Run package
      run: deno run package

    - name: Rename output file
      run: mv release/pacm release/pacm-macos

    - name: Upload compiled files
      uses: actions/upload-artifact@v3
      with:
        name: dist-macos
        path: release/pacm-macos

  create-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Download Windows artifact
      uses: actions/download-artifact@v3
      with:
        name: dist-windows
        path: ./dist-windows

    - name: Download Linux artifact
      uses: actions/download-artifact@v3
      with:
        name: dist-linux
        path: ./dist-linux

    - name: Download macOS artifact
      uses: actions/download-artifact@v3
      with:
        name: dist-macos
        path: ./dist-macos

    - name: Generate release description
      id: generate_release_description
      run: echo "description=Release for tag ${{ github.ref_name }}" >> $GITHUB_ENV

    - name: Create GitHub Release
      env:
        description: ${{ steps.generate_release_description.outputs.description }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create ${{ github.ref_name }} \
          ./dist-windows/pacm-windows.exe#pacm-windows.exe \
          ./dist-linux/pacm-linux#pacm-linux \
          ./dist-macos/pacm-macos#pacm-macos \
          --title "Release ${{ github.ref_name }}" \
          --notes "${{ env.description }}"