name: Release

on:
    release:
        types: [created]

jobs:
    build-windows:
        runs-on: windows-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v2

        - name: Set up Deno
          uses: denoland/setup-deno@v1
          with:
            deno-version: v2.x

        - name: Install dependencies
          run: deno install
  
        - name: Run package
          run: deno run package-windows

        - name: Upload compiled files
          uses: actions/upload-artifact@v3
          with:
            name: dist-windows
            path: release/pacm.exe

    build-linux:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v2

        - name: Set up Deno
          uses: denoland/setup-deno@v1
          with:
            deno-version: v2.x

        - name: Install dependencies
          run: deno install
  
        - name: Run package
          run: deno run package

        - name: Upload compiled files
          uses: actions/upload-artifact@v3
          with:
            name: dist-linux
            path: release/pacm

    build-macos:
        runs-on: macos-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v2

        - name: Set up Deno
          uses: denoland/setup-deno@v1
          with:
            deno-version: v2.x

        - name: Install dependencies
          run: deno install

        - name: Run package
          run: deno run package

        - name: Upload compiled files
          uses: actions/upload-artifact@v3
          with:
            name: dist-macos
            path: release/pacm

    upload-release-assets:
        runs-on: ubuntu-latest
        needs: [build-windows, build-linux, build-macos]
        steps:
        - name: Download Windows artifact
          uses: actions/download-artifact@v3
          with:
            name: dist-windows
            path: ./dist-windows

        - name: Download Linux artifact
          uses: actions/download-artifact@v3
          with:
            name: dist-linux
            path: ./dist-linux

        - name: Download macOS artifact
          uses: actions/download-artifact@v3
          with:
            name: dist-macos
            path: ./dist-macos

        - name: Upload Windows release asset
          uses: actions/upload-release-asset@v1
          env:
            GITHUB_TOKEN: ${{ secrets.PAT }}
          with:
            upload_url: ${{ github.event.release.upload_url }}
            asset_path: ./dist-windows/pacm.exe
            asset_name: pacm.exe
            asset_content_type: application/octet-stream

        - name: Upload Linux release asset
          uses: actions/upload-release-asset@v1
          env:
            GITHUB_TOKEN: ${{ secrets.PAT }}
          with:
            upload_url: ${{ github.event.release.upload_url }}
            asset_path: ./dist-linux/pacm
            asset_name: pacm
            asset_content_type: application/octet-stream

        - name: Upload macOS release asset
          uses: actions/upload-release-asset@v1
          env:
            GITHUB_TOKEN: ${{ secrets.PAT }}
          with:
            upload_url: ${{ github.event.release.upload_url }}
            asset_path: ./dist-macos/pacm
            asset_name: pacm
            asset_content_type: application/octet-stream